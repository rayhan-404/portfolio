<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="refresh" content="5;url=https://xn--p5b2cj9c.xn--45bl4db.xn--54b7fta0cc"/>
  <title>রিডাইরেক্ট হচ্ছে...</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0faf4;
      font-family: 'Hind Siliguri', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: min(400px, 100%);
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeUp 0.5s cubic-bezier(0.05, 0.7, 0.1, 1.0) forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Top hero card ── */
    .hero-card {
      background: #85e0b0;
      border-radius: 28px;
      padding: 32px 28px 28px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute;
      right: -40px; top: -40px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
    }
    .hero-card::after {
      content: '';
      position: absolute;
      right: 20px; bottom: -60px;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.10);
      border-radius: 50%;
    }

    .app-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #1a5c3a;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-label::before {
      content: '';
      display: inline-block;
      width: 20px; height: 2px;
      background: #1a5c3a;
      border-radius: 2px;
    }

    .hero-title {
      font-size: 2.6rem;
      font-weight: 900;
      line-height: 1.1;
      color: #0d2b1a;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
      font-family: 'Hind Siliguri', sans-serif;
    }

    /* bottom row inside hero */
    .hero-bottom {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .hero-sub {
      background: rgba(255,255,255,0.45);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 0.85rem;
      color: #1a3d28;
      line-height: 1.6;
    }

    .hero-pills {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pill {
      background: rgba(255,255,255,0.55);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #0d2b1a;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Countdown card ── */
    .countdown-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .ring-wrap {
      position: relative;
      width: 80px; height: 80px;
      flex-shrink: 0;
    }
    .ring-wrap svg {
      width: 80px; height: 80px;
      transform: rotate(-90deg);
    }
    .ring-track { fill: none; stroke: #e0f2ea; stroke-width: 6; }
    .ring-prog  {
      fill: none;
      stroke: #2dba72;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 201;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .ring-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #1a5c3a;
    }

    .cd-info { flex: 1; }
    .cd-label {
      font-size: 0.78rem;
      color: #6b9c7e;
      margin-bottom: 4px;
    }
    .cd-domain {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0d2b1a;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .cd-domain em {
      font-style: normal;
      color: #1a7a47;
    }

    .progress-track {
      height: 4px;
      background: #e0f2ea;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #2dba72;
      border-radius: 999px;
      transform-origin: left;
      animation: shrink 5s linear forwards;
    }
    @keyframes shrink {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* manual link */
    .manual {
      text-align: center;
      font-size: 0.8rem;
      color: #6b9c7e;
    }
    .manual a {
      color: #1a7a47;
      font-weight: 600;
      text-decoration: none;
    }
    .manual a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- Hero -->
  <div class="hero-card">
    <div class="app-label">CovGen — M Rayhan</div>
    <div class="hero-title">Cover<br>Generator</div>
    <div class="hero-bottom">
      <div class="hero-sub">
        আপনাকে নিয়ে যাওয়া হচ্ছে নতুন ঠিকানায় — ৫ সেকেন্ড অপেক্ষা করুন।
      </div>
      <div class="hero-pills">
        <div class="pill">📄 Templates</div>
        <div class="pill">⬇️ Free PDF</div>
      </div>
    </div>
  </div>

  <!-- Countdown -->
  <div class="countdown-card">
    <div class="ring-wrap">
      <svg viewBox="0 0 80 80">
        <circle class="ring-track" cx="40" cy="40" r="32"/>
        <circle class="ring-prog" id="ring" cx="40" cy="40" r="32"/>
      </svg>
      <div class="ring-num" id="num">৫</div>
    </div>

    <div class="cd-info">
      <div class="cd-label">নতুন ঠিকানা</div>
      <div class="cd-domain"><em>কভার</em>.পাতা.বাংলা</div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <div class="manual">
    রিডাইরেক্ট না হলে <a href="https://xn--p5b2cj9c.xn--45bl4db.xn--54b7fta0cc">এখানে ক্লিক করুন</a>
  </div>

</div>

<script>
  const TOTAL = 5;
  const r = 32;
  const circ = 2 * Math.PI * r;
  const ring = document.getElementById('ring');
  const numEl = document.getElementById('num');
  const bn = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];

  ring.style.strokeDasharray = circ;
  ring.style.strokeDashoffset = 0;

  let left = TOTAL;
  const iv = setInterval(() => {
    left--;
    numEl.textContent = String(left).split('').map(d => bn[+d]).join('');
    ring.style.strokeDashoffset = circ * (1 - left / TOTAL);
    if (left <= 0) {
      clearInterval(iv);
      window.location.href = 'https://xn--p5b2cj9c.xn--45bl4db.xn--54b7fta0cc';
    }
  }, 1000);
</script>
</body>
</html>
