<!DOCTYPE html>
<html lang="bn" data-theme="light">

<head>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Cover Page Generator</title>

    <link rel="manifest" href="icons/manifest.json">
    <meta name="theme-color" content="#A9EFC7">
    <link rel="icon" href="icons/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── EASE TOKENS ─────────────────────── */
        :root {
            --ease: cubic-bezier(0.2, 0, 0, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --t: 0.3s cubic-bezier(0.2, 0, 0, 1);
            --state-hover: rgba(255, 255, 255, .08);
            --state-press: rgba(255, 255, 255, .12);
            --state-focus: rgba(255, 255, 255, .12);

            /* ── 10 M3 COLOUR PALETTES ───────────────

                             secondary-cont, on-secondary-cont,
                             surface, surface-1, surface-2, surface-3, surface-4, surface-5,
                             on-surface, on-surface-var, outline, outline-var,
                             bg, tertiary-cont, on-tertiary-cont,
                             sk-b, sk-s, shadow
            ─────────────────────────────────────── */

            --p0-primary-cont: #AAEFC8;

        /* ── ACTIVE PALETTE VARS ─────────────── */
        [data-theme="light"] {
            --md-primary: var(--p0-primary);
            --md-on-primary: var(--p0-on-primary);
            --md-primary-container: var(--p0-primary-cont);
            --md-on-primary-cont: var(--p0-on-primary-cont);
            --md-secondary-cont: var(--p0-secondary-cont);
            --md-on-secondary-cont: var(--p0-on-secondary-cont);
            --md-surface: var(--p0-surface);
            --md-surface-1: var(--p0-surface-1);
            --md-surface-2: var(--p0-surface-2);
            --md-surface-3: var(--p0-surface-3);
            --md-surface-4: var(--p0-surface-4);
            --md-surface-5: var(--p0-surface-5);
            --md-on-surface: var(--p0-on-surface);
            --md-on-surface-var: var(--p0-on-surface-var);
            --md-outline: var(--p0-outline);
            --md-outline-var: var(--p0-outline-var);
            --md-bg: var(--p0-bg);
            --md-tertiary-cont: var(--p0-tc);
            --md-on-tertiary-cont: var(--p0-otc);
            --sk-b: var(--p0-skb);
            --sk-s: var(--p0-sks);
            --md-shadow: var(--p0-shadow);
            --md-shadow-2: var(--p0-shadow2);
            --md-shadow-3: var(--p0-shadow3);
            --md-scrim: rgba(0, 0, 0, .42);
            --md-inverse-surface: #243528;
            --md-inverse-on-surf: #EAF4E6;
        }

        [data-theme="dark"] {
            --md-primary: #72DBA0;
            --md-on-primary: #003920;
            --md-primary-container: #0A5230;
            --md-on-primary-cont: #A0EFBF;
            --md-secondary-cont: #304A37;
            --md-on-secondary-cont: #C4E4CB;
            --md-tertiary-cont: #004F52;
            --md-on-tertiary-cont: #A2EFF1;
            --md-surface: #0C1410;
            --md-surface-1: #161F19;
            --md-surface-2: #1B261E;
            --md-surface-3: #202D23;
            --md-surface-4: #223026;
            --md-surface-5: #25342A;
            --md-on-surface: #DCE8DC;
            --md-on-surface-var: #ADBCAF;
            --md-outline: #7A9880;
            --md-outline-var: #3A4E3D;
            --md-bg: #0C1410;
            --md-scrim: rgba(0, 0, 0, .65);
            --md-inverse-surface: #DCE8DC;
            --md-inverse-on-surf: #2A3A2C;
            --sk-b: #161F19;
            --sk-s: #202D23;
            --md-shadow: 0 1px 2px rgba(0, 0, 0, .35), 0 1px 3px rgba(0, 0, 0, .18);
            --md-shadow-2: 0 1px 2px rgba(0, 0, 0, .35), 0 2px 6px rgba(0, 0, 0, .18);
            --md-shadow-3: 0 4px 8px rgba(0, 0, 0, .35), 0 1px 3px rgba(0, 0, 0, .18);
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: var(--md-bg);
            color: var(--md-on-surface);
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            transition: background .6s ease, color .6s ease;
        }

        #veil {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--md-bg);
            opacity: 0;
            pointer-events: none;
            transition: opacity .24s ease;
        }

        #veil.out {
            opacity: 1;
            pointer-events: all;
        }

        /* ── COLOUR TRANSITION — targeted smooth palette shift ─── */
        body,
        header,
        nav,
        footer,
        .hero-card,
        .hero-top-band,
        .hero-desc-wrap,
        .hero-stat-pill,
        .design-card,
        .card-tag,
        .card-style-chip,
        .card-cta,
        .sec-count-chip,
        .sheet-style-label,
        .btn-filled,
        .btn-tonal,
        .topbar-title,
        .hero-label,
        .hero-title,
        .hero-desc,
        .nav-indicator,
        .fab-btn,
        .footer-text a,
        .card-name,
        #topbar,
        #bnav,
        .m3-sheet,
        .sheet-body {
            transition:
                background-color 1.4s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 1.4s cubic-bezier(0.4, 0, 0.2, 1),
                color 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 1.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── KEYFRAMES ───────────────────────── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(.92)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes ripM3 {
            to {
                transform: scale(10);
                opacity: 0
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -600px 0
            }

            100% {
                background-position: 600px 0
            }
        }

        @keyframes skelPulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .55
            }
        }

        @keyframes blobFloat {

            0%,
            100% {
                transform: translateY(0) scale(1)
            }

            50% {
                transform: translateY(-8px) scale(1.04)
            }
        }

        @keyframes topbarIn {
            from {
                transform: translateY(-100%);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        @keyframes fabPop {
            0% {
                opacity: 0;
                transform: scale(.4) rotate(-20deg)
            }

            70% {
                transform: scale(1.12) rotate(4deg)
            }

            100% {
                opacity: 1;
                transform: scale(1) rotate(0)
            }
        }

        @keyframes cardRise {
            from {
                opacity: 0;
                transform: translateY(24px) scale(.97)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        @keyframes chipBounce {

            0%,
            100% {
                transform: scale(1)
            }

            40% {
                transform: scale(1.18)
            }

            60% {
                transform: scale(.94)
            }
        }

        /* Smooth palette transition on key elements */
        @keyframes paletteFadeIn {
            from {
                opacity: .7
            }

            to {
                opacity: 1
            }
        }



        /* ── TOP APP BAR ─────────────────────── */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            /* ✅ FIX: always full width */
            right: 0;
            z-index: 300;
            height: calc(64px + env(safe-area-inset-top, 0px));
            padding-top: env(safe-area-inset-top, 0px);
            display: flex;
            align-items: center;
            padding: env(safe-area-inset-top, 0px) 4px 0 4px;
            background: var(--md-surface-2);
            transition: background .6s ease, box-shadow .2s;
            animation: topbarIn .45s var(--ease) both;
        }

        #topbar.scrolled {
            box-shadow: var(--md-shadow-2);
            background: var(--md-surface-3);
        }

        .topbar-inner {
            width: 100%;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 4px;
        }

        .topbar-nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--md-on-surface);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .topbar-nav-btn:active::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--state-press);
            border-radius: 50%;
        }

        .topbar-nav-btn svg {
            width: 24px;
            height: 24px;
        }

        .topbar-title {
            flex: 1;
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--md-on-surface);
            letter-spacing: 0;
            padding-left: 4px;
            transition: color .6s ease;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
        }

        .topbar-action-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--md-on-surface-var);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .topbar-action-btn:active::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--state-press);
            border-radius: 50%;
        }

        .topbar-action-btn svg {
            width: 24px;
            height: 24px;
            position: absolute;
            transition: transform .32s var(--spring), opacity .22s;
        }

        .i-sun {
            opacity: 1;
            transform: scale(1);
        }

        .i-moon {
            opacity: 0;
            transform: scale(.15) rotate(-60deg);
        }

        [data-theme="light"] .i-sun {
            opacity: 0;
            transform: scale(.15) rotate(60deg);
        }

        [data-theme="light"] .i-moon {
            opacity: 1;
            transform: scale(1);
        }

        /* ── SCROLL ROOT ─────────────────────── */
        .root {
            position: relative;
            z-index: 1;
            padding-top: calc(64px + env(safe-area-inset-top, 0px));
            padding-bottom: calc(88px + env(safe-area-inset-bottom, 0px));
        }

        .hero-card {
            margin: 14px 16px 8px;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            animation: scaleIn .5s var(--ease) .1s both;
            background: var(--md-surface-2);
            border: 1px solid var(--md-outline-var);
            transition: background .6s ease, border-color .6s ease;
        }

        .hero-top-band {
            background: var(--md-primary-container);
            padding: 22px 20px 56px;
            position: relative;
            overflow: hidden;
            transition: background .6s ease;
        }

        .hero-top-band::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(114, 219, 160, .28) 0%, transparent 70%);
            animation: blobFloat 5s ease-in-out infinite;
        }

        .hero-top-band::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 30%;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(126, 212, 214, .18) 0%, transparent 70%);
            animation: blobFloat 6.5s ease-in-out infinite reverse;
        }

        .hero-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--md-on-primary-cont);
            opacity: .65;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 1;
            animation: fadeDown .5s var(--ease) .2s both;
            transition: color .6s ease;
        }

        .hero-label::before {
            content: '';
            display: inline-block;
            width: 18px;
            height: 2px;
            background: var(--md-on-primary-cont);
            opacity: .5;
            border-radius: 1px;
        }

        .hero-title {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -.8px;
            color: var(--md-on-primary-cont);
            margin-bottom: 0;
            position: relative;
            z-index: 1;
            animation: fadeUp .55s var(--ease) .3s both;
            transition: color .6s ease;
        }

        .hero-bottom {
            padding: 14px 20px 18px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            position: relative;
            margin-top: -28px;
            animation: fadeUp .5s var(--ease) .45s both;
        }

        .hero-desc-wrap {
            flex: 1;
            min-width: 0;
            background: var(--md-surface-3);
            border-radius: 16px;
            padding: 12px 14px;
            border: 1px solid var(--md-outline-var);
            margin-top: 0;
            transition: background .6s ease, border-color .6s ease;
        }

        .hero-desc {
            font-size: 13px;
            font-weight: 400;
            line-height: 1.55;
            color: var(--md-on-surface-var);
            margin: 0;
            transition: color .6s ease;
        }

        .hero-stats-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .hero-stat-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--md-primary-container);
            border-radius: 50px;
            padding: 7px 13px 7px 10px;
            white-space: nowrap;
            transition: background .6s ease;
        }

        .hero-stat-pill svg {
            width: 14px;
            height: 14px;
            color: var(--md-on-primary-cont);
            flex-shrink: 0;
        }

        .hero-stat-pill span {
            font-size: 12px;
            font-weight: 700;
            color: var(--md-on-primary-cont);
            letter-spacing: .1px;
            transition: color .6s ease;
        }

        .hero-chips,
        .m3-chip {
            display: none;
        }

        /* ── SECTION HEADER ──────────────────── */
        .sec-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 10px;
            animation: fadeUp .4s var(--ease) .55s both;
        }

        .sec-title-text {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: .1px;
            color: var(--md-on-surface);
        }

        .sec-count-chip {
            height: 28px;
            padding: 0 12px;
            border-radius: 8px;
            background: var(--md-secondary-cont);
            color: var(--md-on-secondary-cont);
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: background .6s ease, color .6s ease;
        }

        /* ── CARD LIST ───────────────────────── */
        .card-list {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── SKELETON ────────────────────────── */
        .skel-item {
            border-radius: 16px;
            overflow: hidden;
            background: var(--md-surface-1);
            display: flex;
            align-items: stretch;
            height: 104px;
            animation: fadeUp .4s var(--ease) both;
        }

        .skel-item:nth-child(1) {
            animation-delay: .05s
        }

        .skel-item:nth-child(2) {
            animation-delay: .12s
        }

        .skel-item:nth-child(3) {
            animation-delay: .19s
        }

        .skel-item:nth-child(4) {
            animation-delay: .26s
        }

        .sk {
            background: linear-gradient(90deg, var(--sk-b) 0%, var(--sk-b) 20%, var(--sk-s) 50%, var(--sk-b) 80%, var(--sk-b) 100%);
            background-size: 600px 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .sk::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, .08) 0%, transparent 60%);
            pointer-events: none;
        }

        .sk-thumb {
            width: 104px;
            flex-shrink: 0;
            border-radius: 0;
        }

        .sk-body {
            flex: 1;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: var(--md-surface-1);
        }

        .sk-tag {
            height: 11px;
            width: 42%;
            border-radius: 6px;
        }

        .sk-name {
            height: 18px;
            width: 72%;
            border-radius: 6px;
        }

        .sk-btn {
            height: 30px;
            width: 55%;
            border-radius: 8px;
        }

        .skel-item:nth-child(1) .sk {
            animation-delay: 0s
        }

        .skel-item:nth-child(2) .sk {
            animation-delay: .18s
        }

        .skel-item:nth-child(3) .sk {
            animation-delay: .36s
        }

        .skel-item:nth-child(4) .sk {
            animation-delay: .54s
        }

        /* ── DESIGN CARD ─────────────────────── */
        .design-card {
            display: flex;
            align-items: stretch;
            border-radius: 16px;
            overflow: hidden;
            background: var(--md-surface-1);
            cursor: pointer;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            transition: background .6s ease;
            min-height: 104px;
            box-shadow: var(--md-shadow);
        }

        .card-state {
            position: absolute;
            inset: 0;
            background: var(--md-primary);
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
            border-radius: 16px;
            z-index: 1;
        }

        .design-card:active .card-state {
            opacity: .12;
        }

        .card-rpl {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: 16px;
            pointer-events: none;
            z-index: 5;
        }

        .rpl-c {
            position: absolute;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            margin: -40px 0 0 -40px;
            background: var(--md-primary);
            opacity: .18;
            transform: scale(0);
            animation: ripM3 .5s var(--ease) forwards;
        }

        .card-thumb {
            width: 104px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            background: var(--md-surface-3);
            border-radius: 16px 0 0 16px;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
        }

        .thumb-ph {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumb-ph svg {
            width: 28px;
            height: 28px;
            color: var(--md-outline);
            opacity: .5;
        }

        .card-badge {
            position: absolute;
            top: 8px;
            left: 0;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .3px;
            text-transform: uppercase;
            padding: 3px 8px 3px 6px;
            border-radius: 0 6px 6px 0;
            pointer-events: none;
            z-index: 4;
        }

        .b-popular {
            background: var(--md-tertiary-cont);
            color: var(--md-on-tertiary-cont);
        }

        .b-recommended {
            background: var(--md-primary-container);
            color: var(--md-on-primary-cont);
        }

        .card-content {
            flex: 1;
            min-width: 0;
            padding: 14px 14px 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .card-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .4px;
            color: var(--md-primary);
            transition: color .6s ease;
        }

        .card-style-chip {
            font-size: 10px;
            font-weight: 700;
            color: var(--md-on-secondary-cont);
            background: var(--md-secondary-cont);
            padding: 2px 8px;
            border-radius: 6px;
            transition: background .6s ease, color .6s ease;
        }

        .card-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--md-on-surface);
            letter-spacing: -.2px;
            line-height: 1.3;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-cta {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 32px;
            padding: 0 14px;
            border-radius: 8px;
            background: var(--md-primary-container);
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .3px;
            color: var(--md-on-primary-cont);
            -webkit-tap-highlight-color: transparent;
            transition: all .3s ease;
            width: fit-content;
        }

        .card-cta svg {
            width: 14px;
            height: 14px;
        }

        .card-cta:active {
            filter: brightness(.88);
            transform: scale(.96);
        }

        /* ── BOTTOM SHEET ─────────────────────── */
        .sheet-scrim {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: var(--md-scrim);
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s ease;
        }

        .sheet-scrim.open {
            opacity: 1;
            pointer-events: all;
        }

        .m3-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--md-surface-1);
            border-radius: 28px 28px 0 0;
            transform: translateY(100%);
            transition: transform .4s var(--ease);
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .sheet-scrim.open .m3-sheet {
            transform: translateY(0);
        }

        .sheet-handle {
            display: flex;
            justify-content: center;
            padding: 12px 0 8px;
        }

        .sheet-handle::after {
            content: '';
            width: 32px;
            height: 4px;
            border-radius: 2px;
            background: var(--md-outline-var);
        }

        .sheet-img {
            width: calc(100% - 32px);
            height: 56vw;
            max-height: 300px;
            min-height: 180px;
            overflow: hidden;
            background: var(--md-surface-3);
            border-radius: 16px;
            margin: 0 16px;
            position: relative;
        }

        .sheet-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top;
            display: none;
            border-radius: 16px;
        }

        .sheet-img-ph {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sheet-img-ph svg {
            width: 40px;
            height: 40px;
            color: var(--md-outline);
            opacity: .4;
        }

        .sheet-img-ph span {
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--md-outline);
            text-transform: uppercase;
        }

        .sheet-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--md-surface-3);
            border: none;
            display: grid;
            place-items: center;
            cursor: pointer;
            color: var(--md-on-surface);
            -webkit-tap-highlight-color: transparent;
            z-index: 10;
            transition: background .2s;
        }

        .sheet-close:active {
            background: var(--md-surface-4);
            transform: scale(.9);
        }

        .sheet-close svg {
            width: 18px;
            height: 18px;
        }

        .sheet-body {
            padding: 20px 20px 0;
        }

        .sheet-headline {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--md-on-surface);
            letter-spacing: -.3px;
            margin-bottom: 4px;
        }

        .sheet-supporting {
            font-size: 14px;
            font-weight: 400;
            color: var(--md-on-surface-var);
            margin-bottom: 6px;
        }

        .sheet-style-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 30px;
            padding: 0 12px;
            border-radius: 8px;
            background: var(--md-primary-container);
            color: var(--md-on-primary-cont);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: background .6s ease, color .6s ease;
        }

        .sheet-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 16px;
        }

        .btn-filled {
            width: 100%;
            height: 56px;
            border-radius: 16px;
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: none;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: .1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            transition: background .6s ease, color .6s ease;
            box-shadow: var(--md-shadow-2);
            position: relative;
            overflow: hidden;
        }

        .btn-filled::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            transition: background .2s;
        }

        .btn-filled:active::after {
            background: rgba(0, 0, 0, .12);
        }

        .btn-filled svg {
            width: 18px;
            height: 18px;
        }

        .btn-tonal {
            width: 100%;
            height: 48px;
            border-radius: 14px;
            background: var(--md-secondary-cont);
            color: var(--md-on-secondary-cont);
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            -webkit-tap-highlight-color: transparent;
            transition: background .6s ease, color .6s ease;
        }

        .btn-tonal:active {
            filter: brightness(.9);
        }

        /* ── BOTTOM NAV ──────────────────────── */
        #bnav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 400;
            /* ✅ FIX: full width */
            padding-bottom: env(safe-area-inset-bottom, 0px);
            background: var(--md-surface-2);
            border-top: 1px solid var(--md-outline-var);
            transition: background .6s ease, border-color .6s ease;
        }

        .bnav-row {
            display: flex;
            height: 80px;
            align-items: flex-start;
            padding-top: 12px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .nav-indicator {
            width: 64px;
            height: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background .3s;
        }

        .nav-item.active .nav-indicator {
            background: var(--md-secondary-cont);
        }

        .nav-indicator svg {
            width: 24px;
            height: 24px;
            color: var(--md-on-surface-var);
            transition: color .3s;
        }

        .nav-item.active .nav-indicator svg {
            color: var(--md-on-secondary-cont);
        }

        .nav-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--md-on-surface-var);
            letter-spacing: .4px;
            transition: color .3s, font-weight .2s;
        }

        .nav-item.active .nav-label {
            color: var(--md-on-surface);
            font-weight: 700;
        }

        /* ── FAB ─────────────────────────────── */
        #fab {
            position: fixed;
            bottom: calc(96px + env(safe-area-inset-bottom, 0px));
            right: 16px;
            z-index: 200;
        }

        .fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--md-primary-container);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--md-shadow-3);
            -webkit-tap-highlight-color: transparent;
            transition: background .6s ease;
            color: var(--md-on-primary-cont);
            animation: fabPop .6s var(--spring) .7s both;
        }

        .fab-btn:active {
            transform: scale(.88);
            box-shadow: var(--md-shadow);
        }

        .fab-btn svg {
            width: 24px;
            height: 24px;
        }

        /* ── FOOTER ──────────────────────────── */
        .footer {
            margin: 16px 16px 0;
            padding: 16px 4px;
            border-top: 1px solid var(--md-outline-var);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-text {
            font-size: 12px;
            font-weight: 400;
            color: var(--md-outline);
        }

        .footer-text a {
            color: var(--md-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color .6s ease;
        }

        .footer-icons {
            display: flex;
            gap: 4px;
        }

        .footer-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--md-on-surface-var);
            border: none;
            background: transparent;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            transition: background .2s;
            cursor: pointer;
        }

        .footer-icon-btn:active {
            background: var(--md-surface-3);
        }

        .footer-icon-btn svg {
            width: 20px;

    <script>
        const html = document.documentElement;

        /* ── 10 COLOUR PALETTES ──────────────────── */
        const PALETTES = [
            { name: 'Emerald', pip: '#1A6B3F', keys: ['primary', 'on-primary', 'primary-cont', 'on-primary-cont', 'secondary-cont', 'on-secondary-cont', 'surface', 'surface-1', 'surface-2', 'surface-3', 'surface-4', 'surface-5', 'on-surface', 'on-surface-var', 'outline', 'outline-var', 'bg', 'tc', 'otc', 'skb', 'sks', 'shadow', 'shadow2', 'shadow3'] },
            { name: 'Ocean', pip: '#1655A2' },
            { name: 'Purple', pip: '#6A3ABF' },
            { name: 'Crimson', pip: '#B52A2A' },
            { name: 'Amber', pip: '#8B4D00' },
            { name: 'Teal', pip: '#006874' },
            { name: 'Rose', pip: '#9C2753' },
            { name: 'Lime', pip: '#3A6A00' },
            { name: 'Indigo', pip: '#3344A8' },
            { name: 'Earth', pip: '#6B4226' },
        ];

        const PALETTE_NAMES = ['Emerald', 'Ocean', 'Purple', 'Crimson', 'Amber', 'Teal', 'Rose', 'Lime', 'Indigo', 'Earth'];
        const PIP_COLOURS = ['#1A6B3F', '#1655A2', '#6A3ABF', '#B52A2A', '#8B4D00', '#006874', '#9C2753', '#3A6A00', '#3344A8', '#6B4226'];

        /* CSS var suffix map for each palette index */
        const VAR_KEYS = [
            'primary', 'on-primary', 'primary-cont', 'on-primary-cont',
            'secondary-cont', 'on-secondary-cont',
            'surface', 'surface-1', 'surface-2', 'surface-3', 'surface-4', 'surface-5',
            'on-surface', 'on-surface-var', 'outline', 'outline-var',
            'bg', 'tc', 'otc', 'skb', 'sks',
            'shadow', 'shadow2', 'shadow3'
        ];
        const MD_PROPS = [
            '--md-primary', '--md-on-primary', '--md-primary-container', '--md-on-primary-cont',
            '--md-secondary-cont', '--md-on-secondary-cont',
            '--md-surface', '--md-surface-1', '--md-surface-2', '--md-surface-3', '--md-surface-4', '--md-surface-5',
            '--md-on-surface', '--md-on-surface-var', '--md-outline', '--md-outline-var',
            '--md-bg', '--md-tertiary-cont', '--md-on-tertiary-cont', '--sk-b', '--sk-s',
            '--md-shadow', '--md-shadow-2', '--md-shadow-3'
        ];
        const PREFIX = ['p0', 'p1', 'p2', 'p3', 'p4', 'p5', 'p6', 'p7', 'p8', 'p9'];
        const SUFFIX = ['primary', 'on-primary', 'primary-cont', 'on-primary-cont', 'secondary-cont', 'on-secondary-cont', 'surface', 'surface-1', 'surface-2', 'surface-3', 'surface-4', 'surface-5', 'on-surface', 'on-surface-var', 'outline', 'outline-var', 'bg', 'tc', 'otc', 'skb', 'sks', 'shadow', 'shadow2', 'shadow3'];

        let currentPalette = 0;

        function applyPalette(idx) {
            if (html.getAttribute('data-theme') === 'dark') return;
            const p = PREFIX[idx];
            MD_PROPS.forEach((prop, i) => {
                const val = getComputedStyle(html).getPropertyValue(`--${p}-${SUFFIX[i]}`).trim();
                if (val) html.style.setProperty(prop, val);
            });
            currentPalette = idx;
        }


        /* ── THEME TOGGLE ────────────────────────── */
        document.getElementById('themeBtn').addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                // light mode — re-apply current palette
                html.setAttribute('data-theme', 'light');
                setTimeout(() => applyPalette(currentPalette), 20);
            } else {
                // dark mode — remove inline overrides so [data-theme="dark"] CSS wins
                MD_PROPS.forEach(prop => html.style.removeProperty(prop));
                html.setAttribute('data-theme', 'dark');
            }
        });

        window.addEventListener('scroll', () => {
            document.getElementById('topbar').classList.toggle('scrolled', scrollY > 4);
        }, { passive: true });

        /* ── VEIL ────────────────────────────────── */
        const veil = document.getElementById('veil');
        function goTo(href) { veil.classList.add('out'); setTimeout(() => location.href = href, 240); }

        /* ── RIPPLE ──────────────────────────────── */
        function ripple(card, e) {
            const l = card.querySelector('.card-rpl'); if (!l) return;
            const d = document.createElement('span'); d.className = 'rpl-c';
            const r = l.getBoundingClientRect();
            d.style.cssText = `left:${e.clientX - r.left}px;top:${e.clientY - r.top}px;`;
            l.appendChild(d); d.addEventListener('animationend', () => d.remove());
        }




        /* Auto-cycle every 4 seconds — smooth drift */
        setInterval(() => {
            applyPalette((currentPalette + 1) % 10);
        }, 5000);

        /* ── DATA ────────────────────────────────── */
        const DESIGNS = [
            { id: 'style1', name: 'North Western University', preview: 'designs/style1/preview.png', badge: 'popular' },
            { id: 'style2', name: 'North Western University', preview: 'designs/style2/preview.png', badge: 'recommended' },
            { id: 'style3', name: 'North Western University', preview: 'designs/style3/preview.png', badge: null },
            { id: 'style4', name: 'North Western University', preview: 'designs/style4/preview.png', badge: null },
        ];
        const BADGE = { popular: 'Popular', recommended: 'Recommended' };
        const sP = new URLSearchParams(location.search).get('s');

        document.getElementById('chip-count').textContent = DESIGNS.length + ' Templates';
        document.getElementById('count-chip').textContent = DESIGNS.length + ' available';

        /* ── SHEET ───────────────────────────────── */
        const scrim = document.getElementById('scrim');
        const sheetEl = document.getElementById('sheetEl');
        const sheetImg = document.getElementById('sheetImg');
        const sheetPh = document.getElementById('sheetPh');
        const sheetLabel = document.getElementById('sheetStyleLabel');
        const sheetTitle = document.getElementById('sheetHeadline');
        const sheetUse = document.getElementById('sheetUse');
        let prevImg = null;

        function openSheet(d, i) {
            sheetLabel.textContent = 'Template 0' + (i + 1);
            sheetTitle.textContent = d.name;
            sheetUse.href = 'cover/form.html?design=' + d.id + (sP ? '&s=' + sP : '');
            if (prevImg) { prevImg.remove(); prevImg = null; }
            sheetPh.style.display = 'flex';
            if (d.preview) {
                prevImg = document.createElement('img');
                prevImg.src = d.preview; prevImg.alt = d.name;
                prevImg.onload = () => { sheetPh.style.display = 'none'; prevImg.style.display = 'block'; };
                sheetImg.appendChild(prevImg);
            }
            scrim.classList.add('open');
            document.body.style.overflow = 'hidden';
            let sy = 0, cy = 0, active = false;
            const ts = e => { sy = e.touches[0].clientY; cy = 0; active = true; sheetEl.style.transition = 'none'; };
            const tm = e => { if (!active) return; cy = Math.max(0, e.touches[0].clientY - sy); sheetEl.style.transform = `translateY(${cy}px)`; if (e.cancelable) e.preventDefault(); };
            const te = () => { if (!active) return; active = false; sheetEl.style.transition = ''; cy > 80 ? (close(), sheetEl.style.transform = '') : (sheetEl.style.transform = ''); };
            sheetEl.addEventListener('touchstart', ts, { passive: true });
            sheetEl.addEventListener('touchmove', tm, { passive: false });
            sheetEl.addEventListener('touchend', te);
        }

        function close() { scrim.classList.remove('open'); document.body.style.overflow = ''; }

        document.getElementById('sheetClose').addEventListener('click', close);
        document.getElementById('sheetCancel').addEventListener('click', close);
        scrim.addEventListener('click', e => { if (e.target === scrim) close(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
        sheetUse.addEventListener('click', e => { e.preventDefault(); close(); setTimeout(() => goTo(sheetUse.href), 200); });

        /* ── RENDER CARDS ────────────────────────── */
        const cardsEl = document.getElementById('cards');
        const skelBox = document.getElementById('skel-box');

        const PH_INNER = `<div class="thumb-ph"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 6.414V19a2 2 0 01-2 2z"/></svg></div>`;

        setTimeout(() => {
            DESIGNS.forEach((d, i) => {
                const wrap = document.createElement('div');
                wrap.style.animation = `cardRise .5s cubic-bezier(0.2,0,0,1) ${i * .1}s both`;
                const card = document.createElement('div');
                card.className = 'design-card';
                card.innerHTML = `<div class="card-state"></div><div class="card-rpl"></div>`;
                const thumb = document.createElement('div'); thumb.className = 'card-thumb';
                if (d.preview) {
                    const img = document.createElement('img');
                    img.src = d.preview; img.alt = d.name; img.loading = 'lazy';
                    img.onerror = () => { thumb.innerHTML = PH_INNER; };
                    thumb.appendChild(img);
                } else { thumb.innerHTML = PH_INNER; }
                if (d.badge) {
                    const b = document.createElement('div');
                    b.className = 'card-badge b-' + d.badge; b.textContent = BADGE[d.badge];
                    thumb.appendChild(b);
                }
                const content = document.createElement('div'); content.className = 'card-content';
                content.innerHTML = `
                <div>
                    <div class="card-top">
                        <span class="card-tag">Cover Design</span>
                        <span class="card-style-chip">0${i + 1}</span>
                    </div>
                    <div class="card-name">${d.name}</div>
                </div>
                <button class="card-cta">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    Preview
                </button>`;
                card.appendChild(thumb); card.appendChild(content);
                card.addEventListener('click', e => { ripple(card, e); openSheet(d, i); });
                card.setAttribute('role', 'button'); card.setAttribute('tabindex', '0');
                card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openSheet(d, i); } });
                wrap.appendChild(card); cardsEl.appendChild(wrap);
            });

            skelBox.style.transition = 'opacity .28s';
            skelBox.style.opacity = '0';
            setTimeout(() => {
                skelBox.remove();
                cardsEl.style.display = '';
                const chip = document.getElementById('count-chip');
                if (chip) { chip.style.animation = 'chipBounce .5s var(--spring) both'; }
            }, 280);
        }, 650);
    </script>
</body>

</html>
