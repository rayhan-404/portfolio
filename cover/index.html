<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="5;url=https://xn--p5b2cj9c.xn--45bl4db.xn--54b7fta0cc" />
  <title>রিডাইরেক্ট হচ্ছে...</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Noto+Serif+Bengali:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #131929;
      --border: #1e2d45;
      --accent: #00c896;
      --accent2: #0077ff;
      --text: #e8edf5;
      --muted: #6b7fa3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hind Siliguri', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,200,150,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,150,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 20s linear infinite;
    }
    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(100px); pointer-events: none; z-index: 0;
    }
    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(0,200,150,0.13), transparent 70%);
      top: -180px; left: -180px;
      animation: float1 12s ease-in-out infinite;
    }
    .orb-2 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(0,119,255,0.11), transparent 70%);
      bottom: -140px; right: -140px;
      animation: float2 15s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(60px,40px); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(-50px,-30px); }
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      width: min(480px, 90vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 44px;
      box-shadow:
        0 0 0 1px rgba(0,200,150,0.07),
        0 32px 80px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) forwards;
      opacity: 0;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Ring */
    .countdown-ring {
      position: relative;
      width: 140px; height: 140px;
    }
    .countdown-ring svg {
      width: 140px; height: 140px;
      transform: rotate(-90deg);
    }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
    .ring-fg {
      fill: none;
      stroke: var(--accent);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 345;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 10px rgba(0,200,150,0.65));
    }
    .countdown-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Serif Bengali', serif;
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* Text */
    .redirect-label {
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: -16px;
    }
    .redirect-url {
      font-family: 'Noto Serif Bengali', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }
    .redirect-url em {
      color: var(--accent);
      font-style: normal;
    }

    /* Progress */
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      transform-origin: left;
      animation: shrink 5s linear forwards;
    }
    @keyframes shrink {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* Manual link */
    .manual-link {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
    }
    .manual-link a {
      color: var(--accent2);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,119,255,0.3);
      transition: border-color 0.2s;
    }
    .manual-link a:hover { border-color: var(--accent2); }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">

    <div class="countdown-ring">
      <svg viewBox="0 0 140 140">
        <circle class="ring-bg" cx="70" cy="70" r="55"/>
        <circle class="ring-fg" id="ring" cx="70" cy="70" r="55"/>
      </svg>
      <div class="countdown-num" id="num">৫</div>
    </div>

    <div class="redirect-label">কভার জেনারেটর এখন নতুন ঠিকানায় 🎉</div>

    <div class="redirect-url"><em>কভার</em>.পাতা.বাংলা</div>

    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>

    <div class="manual-link">
      রিডাইরেক্ট না হলে <a href="https://xn--p5b2cj9c.xn--45bl4db.xn--54b7fta0cc">এখানে ক্লিক করুন</a>
    </div>

  </div>

  <script>
    const TOTAL = 5;
    const r = 55;
    const circumference = 2 * Math.PI * r;
    const ring = document.getElementById('ring');
    const numEl = document.getElementById('num');
    const bnDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];

    function toBn(n) {
      return String(n).split('').map(d => bnDigits[+d]).join('');
    }

    ring.style.strokeDasharray = circumference;
    ring.style.strokeDashoffset = 0;

    let remaining = TOTAL;

    const interval = setInterval(() => {
      remaining--;
      numEl.textContent = toBn(remaining);
      ring.style.strokeDashoffset = circumference * (1 - remaining / TOTAL);

      if (remaining <= 0) {
        clearInterval(interval);
        window.location.href = 'https://xn--p5b2cj9c.xn--45bl4db.xn--54b7fta0cc';
      }
    }, 1000);
  </script>
</body>
</html>
