<!DOCTYPE html>
<html lang="bn" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Cover Page Generator — M Rayhan</title>

    <link rel="manifest" href="icons/manifest.json">
<meta name="theme-color" content="#A9EFC7">
<link rel="icon" href="icons/favicon.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ease:        cubic-bezier(0.2, 0, 0, 1);
      --spring:      cubic-bezier(0.34, 1.56, 0.64, 1);
      --t:           0.3s cubic-bezier(0.2, 0, 0, 1);
      --state-press: rgba(0,0,0,.10);
      --bnav-h:      80px;
    }

    /* ── DARK ──────────────────────────────── */
    [data-theme="dark"] {
      --md-primary:          #72DBA0;
      --md-on-primary:       #003920;
      --md-primary-container:#0A5230;
      --md-on-primary-cont:  #A0EFBF;
      --md-secondary:        #A8C8AF;
      --md-on-secondary:     #1A3320;
      --md-secondary-cont:   #304A37;
      --md-on-secondary-cont:#C4E4CB;
      --md-tertiary:         #7ED4D6;
      --md-on-tertiary:      #003739;
      --md-tertiary-cont:    #004F52;
      --md-on-tertiary-cont: #A2EFF1;
      --md-surface:          #0C1410;
      --md-surface-1:        #161F19;
      --md-surface-2:        #1B261E;
      --md-surface-3:        #202D23;
      --md-surface-4:        #223026;
      --md-on-surface:       #DCE8DC;
      --md-on-surface-var:   #ADBCAF;
      --md-outline:          #7A9880;
      --md-outline-var:      #3A4E3D;
      --md-bg:               #0C1410;
      --md-scrim:            rgba(0,0,0,.65);
      --md-shadow:           0 1px 2px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.18);
      --md-shadow-2:         0 1px 2px rgba(0,0,0,.35),0 2px 6px rgba(0,0,0,.18);
      --md-shadow-3:         0 4px 8px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.18);
    }

    /* ── LIGHT ─────────────────────────────── */
    [data-theme="light"] {
      --md-primary:          #1A6B3F;
      --md-on-primary:       #FFFFFF;
      --md-primary-container:#AAEFC8;
      --md-on-primary-cont:  #002111;
      --md-secondary:        #4A6350;
      --md-on-secondary:     #FFFFFF;
      --md-secondary-cont:   #CCE8D2;
      --md-on-secondary-cont:#071F0D;
      --md-tertiary:         #006B6D;
      --md-on-tertiary:      #FFFFFF;
      --md-tertiary-cont:    #9CF0F2;
      --md-on-tertiary-cont: #002021;
      --md-surface:          #F4FBF0;
      --md-surface-1:        #EAF4E6;
      --md-surface-2:        #E2EFDD;
      --md-surface-3:        #DAEBD5;
      --md-surface-4:        #D7E8D2;
      --md-on-surface:       #0F1F12;
      --md-on-surface-var:   #3D5040;
      --md-outline:          #527558;
      --md-outline-var:      #BCCFBE;
      --md-bg:               #F4FBF0;
      --md-scrim:            rgba(0,0,0,.42);
      --md-shadow:           0 1px 2px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.07);
      --md-shadow-2:         0 1px 2px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.07);
      --md-shadow-3:         0 4px 8px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.07);
    }

    /* ── BASE ──────────────────────────────── */
    html { scroll-behavior: smooth; height: 100%; }
    body {
      background: var(--md-bg); color: var(--md-on-surface);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh; -webkit-font-smoothing: antialiased;
      overflow-x: hidden; display: block; padding: 0;
      transition: background var(--t), color var(--t);
    }

    /* ── KEYFRAMES ─────────────────────────── */
    @keyframes topbarIn  { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes bnavIn    { from{transform:translateY(100%);opacity:0}  to{transform:translateY(0);opacity:1} }
    @keyframes fadeUp    { from{opacity:0;transform:translateY(14px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes blobFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-6px) scale(1.03)} }
    @keyframes secIn     { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* ══════════════════════════════════════════
       TOP APP BAR
    ══════════════════════════════════════════ */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 400;
      height: calc(64px + env(safe-area-inset-top,0px));
      padding: env(safe-area-inset-top,0px) 4px 0 4px;
      display: flex; align-items: center;
      background: var(--md-surface-2);
      transition: background var(--t), box-shadow .2s;
      animation: topbarIn .45s var(--ease) both;
    }
    #topbar.scrolled { box-shadow: var(--md-shadow-2); background: var(--md-surface-3); }

    .topbar-inner { width:100%; height:64px; display:flex; align-items:center; padding:0 4px; }

    .topbar-nav-btn {
      width:48px; height:48px; border-radius:50%;
      border:none; background:transparent;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--md-on-surface);
      -webkit-tap-highlight-color:transparent;
      position:relative; overflow:hidden; flex-shrink:0;
      text-decoration:none; transition:background .18s;
    }
    .topbar-nav-btn:hover { background:var(--md-surface-3); }
    .topbar-nav-btn svg { width:22px; height:22px; }

    .topbar-title {
      flex:1; font-family:'Syne',sans-serif;
      font-size:20px; font-weight:700;
      color:var(--md-on-surface); padding:0 4px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .topbar-actions { display:flex; align-items:center; flex-shrink:0; }
    .topbar-action-btn {
      width:48px; height:48px; border-radius:50%;
      border:none; background:transparent;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--md-on-surface-var);
      -webkit-tap-highlight-color:transparent;
      position:relative; overflow:hidden; transition:background .18s;
    }
    .topbar-action-btn:hover { background:var(--md-surface-3); }
    .topbar-action-btn svg {
      width:22px; height:22px; position:absolute;
      transition:transform .32s var(--spring), opacity .22s;
    }
    .i-sun  { opacity:1; transform:scale(1); }
    .i-moon { opacity:0; transform:scale(.15) rotate(-60deg); }
    [data-theme="light"] .i-sun  { opacity:0; transform:scale(.15) rotate(60deg); }
    [data-theme="light"] .i-moon { opacity:1; transform:scale(1); }

    /* ══════════════════════════════════════════
       M3 BOTTOM NAVIGATION BAR
    ══════════════════════════════════════════ */
    #bnav {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 500;
      height: calc(var(--bnav-h) + env(safe-area-inset-bottom,0px));
      background: var(--md-surface-2);
      border-top: 1px solid var(--md-outline-var);
      transition: background var(--t), border-color var(--t);
      animation: bnavIn .5s var(--ease) .15s both;
    }

    .bnav-row {
      height: var(--bnav-h);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 8px;
    }

    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      text-decoration: none; cursor: pointer;
      background: none; border: none; padding: 8px 4px 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-indicator {
      width: 64px; height: 32px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      transition: background .22s var(--ease);
      position: relative; overflow: hidden;
    }
    .nav-item.active .nav-indicator { background: var(--md-secondary-cont); }
    .nav-item:active .nav-indicator { background: var(--md-surface-3); }

    .nav-indicator svg {
      width: 22px; height: 22px;
      color: var(--md-on-surface-var);
      transition: color .2s;
    }
    .nav-item.active .nav-indicator svg { color: var(--md-on-surface); }

    .nav-label {
      font-size: 11.5px; font-weight: 500;
      color: var(--md-on-surface-var);
      letter-spacing: .1px; transition: color .2s, font-weight .2s;
    }
    .nav-item.active .nav-label { color: var(--md-on-surface); font-weight: 700; }

    /* ══════════════════════════════════════════
       PAGE LAYOUT
    ══════════════════════════════════════════ */
    .page {
      position: relative; z-index: 1;
      display: grid; grid-template-columns: 420px 1fr;
      min-height: 100vh;
      padding-top: calc(64px + env(safe-area-inset-top,0px));
      transition: filter .32s var(--ease), transform .32s var(--ease);
    }
    .page.sheet-open {
      filter: blur(8px) brightness(.72) saturate(.75);
      transform: scale(.975);
      pointer-events: none;
    }

    /* ══════════════════════════════════════════
       FORM PANEL (LEFT)
    ══════════════════════════════════════════ */
    .form-panel {
      border-right: 1px solid var(--md-outline-var);
      display: flex; flex-direction: column;
      height: calc(100vh - 64px - env(safe-area-inset-top,0px));
      position: sticky;
      top: calc(64px + env(safe-area-inset-top,0px));
      overflow: hidden;
      transition: background var(--t), border-color var(--t);
    }

    /* ══════════════════════════════════════════
       HERO CARD
    ══════════════════════════════════════════ */
    @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn  { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }

    .form-hero {
      flex-shrink: 0;
      margin: 14px 14px 8px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: var(--md-surface-1);
      border: 1px solid var(--md-outline-var);
      animation: scaleIn .5s var(--ease) .1s both;
      transition: background var(--t), border-color var(--t);
    }

    .hero-top-band {
      background: var(--md-primary-container);
      padding: 22px 20px 52px;
      position: relative; overflow: hidden;
    }
    .hero-top-band::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 220px; height: 220px; border-radius: 50%;
      background: radial-gradient(circle, rgba(114,219,160,.28) 0%, transparent 70%);
      animation: blobFloat 5s ease-in-out infinite;
      pointer-events: none;
    }
    .hero-top-band::after {
      content: '';
      position: absolute; bottom: -20px; left: 30%;
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle, rgba(126,212,214,.18) 0%, transparent 70%);
      animation: blobFloat 6.5s ease-in-out infinite reverse;
      pointer-events: none;
    }

    .hero-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--md-on-primary-cont); opacity: .65;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
      position: relative; z-index: 1;
      animation: fadeDown .5s var(--ease) .2s both;
    }
    .hero-label::before {
      content: ''; display: inline-block;
      width: 18px; height: 2px;
      background: var(--md-on-primary-cont); opacity: .5; border-radius: 1px;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px; font-weight: 800;
      line-height: 1.1; letter-spacing: -.8px;
      color: var(--md-on-primary-cont);
      position: relative; z-index: 1;
      animation: fadeUp .55s var(--ease) .3s both;
    }

    .hero-bottom {
      padding: 14px 20px 18px;
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px;
      margin-top: -28px;
      position: relative;
      animation: fadeUp .5s var(--ease) .45s both;
    }

    .hero-desc-wrap {
      flex: 1; min-width: 0;
      background: var(--md-surface-3);
      border-radius: 16px; padding: 12px 14px;
      border: 1px solid var(--md-outline-var);
    }
    .hero-desc {
      font-size: 13px; font-weight: 400;
      line-height: 1.55; color: var(--md-on-surface-var); margin: 0;
    }

    .hero-stats-col {
      display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
    }
    .hero-stat-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--md-primary-container);
      border-radius: 50px; padding: 7px 13px 7px 10px;
      white-space: nowrap;
    }
    .hero-stat-pill svg { width: 14px; height: 14px; color: var(--md-on-primary-cont); flex-shrink: 0; }
    .hero-stat-pill span { font-size: 12px; font-weight: 700; color: var(--md-on-primary-cont); letter-spacing: .1px; }

    /* Scroll area */
    .form-scroll {
      flex:1; overflow-y:auto;
      padding:14px 14px 20px;
      background: var(--md-bg);
    }
    .form-scroll::-webkit-scrollbar { width:4px; }
    .form-scroll::-webkit-scrollbar-thumb { background:var(--md-outline-var); border-radius:4px; }
    .form-scroll::-webkit-scrollbar-track { background:transparent; }

    /* ══════════════════════════════════════════
       FORM SECTIONS — dropdown fix applied
    ══════════════════════════════════════════ */
    .form-section {
      margin-bottom: 10px;
      border-radius: 16px;
      /* overflow: visible — lets .options drop outside the card */
      overflow: visible;
      border: 1px solid var(--md-outline-var);
      background: var(--md-surface-1);
      box-shadow: var(--md-shadow);
      position: relative;
      z-index: 1; /* base stacking layer */
      transition: border-color var(--t), background var(--t), box-shadow var(--t);
      animation: secIn .4s var(--ease) both;
    }
    .form-section:nth-child(1) { animation-delay:.05s; }
    .form-section:nth-child(2) { animation-delay:.13s; }
    .form-section:nth-child(3) { animation-delay:.21s; }
    .form-section:nth-child(4) { animation-delay:.29s; }

    /* Lift the section whose dropdown is open above all siblings */
    .form-section:has(.options.open) { z-index: 100; }

    /* Section header — top corners rounded, clips hover ripple */
    .section-head {
      display:flex; align-items:center; gap:10px;
      padding:13px 16px;
      cursor:pointer; user-select:none;
      background: var(--md-surface-1);
      transition:background .18s;
      border:none; width:100%; text-align:left;
      -webkit-tap-highlight-color:transparent;
      border-radius: 16px 16px 0 0;
      overflow: hidden; /* clips hover bg to rounded top corners */
    }
    .section-head:hover { background: var(--md-surface-2); }
    /* When collapsed the head is the whole card — round all corners */
    .form-section.collapsed .section-head { border-radius: 16px; }

    .section-icon {
      width:34px; height:34px; border-radius:10px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      background: var(--md-primary-container);
    }
    .section-icon svg { width:17px; height:17px; color:var(--md-on-primary-cont); }

    .section-title {
      flex:1;
      font-family:'Syne',sans-serif;
      font-size:13.5px; font-weight:700;
      color:var(--md-on-surface); letter-spacing:-.1px;
    }

    .section-badge {
      font-size:10.5px; font-weight:600;
      color:var(--md-on-secondary-cont);
      background:var(--md-secondary-cont);
      padding:2px 9px; border-radius:6px;
      white-space:nowrap;
    }

    .section-chevron {
      width:16px; height:16px; color:var(--md-outline);
      transition:transform .28s var(--ease); flex-shrink:0;
    }
    .form-section.collapsed .section-chevron { transform:rotate(-90deg); }

    /* Section body — bottom corners rounded, overflow visible for dropdown */
    .section-body {
      padding:2px 14px 14px;
      border-top:1px solid var(--md-outline-var);
      background: var(--md-surface-1);
      border-radius: 0 0 16px 16px;
      overflow: visible;
    }
    .form-section.collapsed .section-body { display:none; }

    /* ── Input Groups ─────────────────────── */
    .input-group { margin-top:12px; }

    .input-group label {
      display:block; margin-bottom:6px;
      font-size:11px; font-weight:600;
      color:var(--md-on-surface-var);
      letter-spacing:.5px; text-transform:uppercase;
    }

    .input-group input[type="text"],
    .input-group select,
    .input-group textarea {
      width:100%; padding:10px 14px;
      background: var(--md-surface-2);
      border:1.5px solid var(--md-outline-var);
      border-radius:10px;
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:14px; color:var(--md-on-surface);
      transition:all .18s var(--ease); outline:none;
    }
    .input-group input[type="text"]:hover,
    .input-group select:hover,
    .input-group textarea:hover { border-color:var(--md-outline); background: var(--md-surface-3); }
    .input-group input[type="text"]:focus,
    .input-group select:focus,
    .input-group textarea:focus {
      border-color:var(--md-primary); background:var(--md-surface-1);
      box-shadow:0 0 0 3px rgba(26,107,63,.12);
    }
    [data-theme="dark"] .input-group input:focus,
    [data-theme="dark"] .input-group select:focus,
    [data-theme="dark"] .input-group textarea:focus {
      box-shadow:0 0 0 3px rgba(114,219,160,.12);
    }
    .input-group input::placeholder,
    .input-group textarea::placeholder { color:var(--md-outline); }
    .input-group textarea { resize:vertical; min-height:72px; line-height:1.6; }

    .dept-row { display:flex; gap:8px; align-items:flex-start; }
    .dept-row input { flex:1; }
    .dept-row select { width:100px; flex-shrink:0; padding:10px 8px; text-align:center; appearance:none; cursor:pointer; }

    /* ── Custom Select ───────────────────── */
    .custom-select { position:relative; }
    .select-trigger {
      width:100%; padding:10px 14px;
      background: var(--md-surface-2); border:1.5px solid var(--md-outline-var);
      border-radius:10px; font-size:14px; color:var(--md-on-surface);
      cursor:pointer; display:flex; justify-content:space-between; align-items:center;
      transition:all .18s var(--ease); user-select:none;
    }
    .select-trigger:hover { border-color:var(--md-outline); background: var(--md-surface-3); }
    .select-trigger.open {
      border-color:var(--md-primary); background:var(--md-surface-1);
      box-shadow:0 0 0 3px rgba(26,107,63,.12);
    }
    [data-theme="dark"] .select-trigger.open { box-shadow:0 0 0 3px rgba(114,219,160,.12); }
    .select-trigger .arrow { color:var(--md-outline); font-size:11px; transition:.2s; }
    .select-trigger.open .arrow { transform:rotate(180deg); color:var(--md-primary); }

    .options {
      position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:999;
      background:var(--md-surface-1); border:1.5px solid var(--md-outline-var);
      border-radius:12px; box-shadow:var(--md-shadow-3);
      opacity:0; transform:translateY(8px); pointer-events:none;
      transition:all .18s var(--ease); max-height:200px; overflow-y:auto;
    }
    .options.open { opacity:1; transform:translateY(0); pointer-events:all; }
    .option { padding:10px 14px; font-size:14px; color:var(--md-on-surface-var); cursor:pointer; transition:.15s; }
    .option:hover { background:var(--md-primary-container); color:var(--md-on-primary-cont); }
    .option.active { background:var(--md-primary-container); color:var(--md-on-primary-cont); font-weight:600; }

    /* ── Form action button ── */
    .form-actions {
      display: flex;
      margin: 12px 0 10px;
      animation: secIn .4s var(--ease) .34s both;
    }

    .btn-form-filled {
      width: 100%; height: 52px;
      border-radius: 16px;
      background: var(--md-primary);
      color: var(--md-on-primary);
      border: none; cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: .1px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: all .2s var(--ease); box-shadow: var(--md-shadow-2);
      position: relative; overflow: hidden;
    }
    .btn-form-filled::after {
      content:''; position:absolute; inset:0;
      background:rgba(0,0,0,0); transition: background .2s;
    }
    .btn-form-filled:active::after { background:rgba(0,0,0,.12); }
    .btn-form-filled:hover { filter: brightness(1.06); box-shadow: var(--md-shadow-3); transform: translateY(-1px); }
    .btn-form-filled svg { width: 17px; height: 17px; }

    /* ── Share Section ───────────────────── */
    .share-section {
      padding: 14px 16px 16px;
      background: var(--md-surface-1);
      border: 1px solid var(--md-outline-var);
      border-radius: 16px;
      box-shadow: var(--md-shadow);
      animation: secIn .4s var(--ease) .40s both;
    }
    .share-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: var(--md-on-surface-var); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .share-label::before {
      content: ''; display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--md-tertiary);
    }
    .btn-share {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1.5px solid var(--md-outline-var);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px; font-weight: 600; color: var(--md-on-surface-var);
      background: var(--md-surface-2); cursor: pointer;
      transition: all .2s var(--ease);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-share:hover {
      border-color: var(--md-tertiary);
      background: var(--md-tertiary-cont);
      color: var(--md-on-tertiary-cont);
    }
    .btn-share svg { width: 14px; height: 14px; }

    .share-link-row { display:none; margin-top:10px; gap:8px; align-items:center; }
    .share-link-row.visible { display:flex; }
    .share-link-input {
      flex:1; padding:9px 12px; background:var(--md-surface-2);
      border:1.5px solid var(--md-outline-var); border-radius:8px;
      color:var(--md-on-surface); font-size:12px; font-family:monospace;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      min-width:0; outline:none;
    }
    .share-link-input:focus { border-color:var(--md-primary); }
    .btn-copy {
      flex-shrink:0; padding:9px 14px; border-radius:8px;
      border:1.5px solid var(--md-outline-var); background:var(--md-surface-2);
      color:var(--md-on-surface-var);
      font-family:'Plus Jakarta Sans',sans-serif; font-size:12.5px; font-weight:600;
      cursor:pointer; transition:all .2s var(--ease); white-space:nowrap;
    }
    .btn-copy:hover { border-color:var(--md-primary); color:var(--md-primary); background:var(--md-primary-container); }
    .btn-copy.copied { border-color:var(--md-secondary); color:var(--md-secondary); background:var(--md-secondary-cont); }

    /* ══════════════════════════════════════════
       PREVIEW PANEL (RIGHT / DESKTOP)
    ══════════════════════════════════════════ */
    .preview-panel {
      background:var(--md-surface);
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-start;
      padding:32px 28px 40px;
      min-height:calc(100vh - 64px - env(safe-area-inset-top,0px));
      position:relative; transition:background var(--t);
    }
    .preview-panel::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background-image:radial-gradient(circle, var(--md-outline-var) 1px, transparent 1px);
      background-size:24px 24px; opacity:.45;
    }
    .preview-topbar {
      position:relative; z-index:2;
      width:100%; max-width:520px;
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px;
      animation:fadeUp .45s var(--ease) .15s both;
    }
    .preview-label {
      font-size:11px; font-weight:700;
      letter-spacing:1.4px; text-transform:uppercase;
      color:var(--md-on-surface-var);
      display:flex; align-items:center; gap:8px;
    }
    .preview-label::before {
      content:''; display:inline-block;
      width:7px; height:7px; border-radius:50%;
      background:var(--md-primary);
      animation:livePulse 2s ease-in-out infinite;
    }
    .btn-download-top {
      display:inline-flex; align-items:center; gap:7px;
      height:40px; padding:0 20px; border-radius:20px; border:none;
      font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
      background:var(--md-primary); color:var(--md-on-primary);
      cursor:pointer; transition:all .22s var(--ease); box-shadow:var(--md-shadow-2);
    }
    .btn-download-top:hover { filter:brightness(1.08); box-shadow:var(--md-shadow-3); transform:translateY(-1px); }
    .btn-download-top:active { transform:translateY(0); filter:brightness(.92); }
    .btn-download-top svg { width:14px; height:14px; }

    .a4-outer {
      position:relative; z-index:2;
      width:100%; max-width:520px;
      aspect-ratio:794/1123;
      animation:fadeUp .5s var(--ease) .25s both;
    }
    .a4-scaler {
      position:absolute; inset:0;
      display:flex; align-items:flex-start; justify-content:center; overflow:hidden;
    }
    #previewWrapper {
      transform-origin:top center;
      width:794px; height:1123px;
      box-shadow:var(--md-shadow-3), 0 20px 60px rgba(0,0,0,.18);
      border-radius:2px;
    }

    /* ══════════════════════════════════════════
       M3 BOTTOM SHEET — preview
    ══════════════════════════════════════════ */
    @keyframes scrimIn  { from{opacity:0} to{opacity:1} }
    @keyframes scrimOut { from{opacity:1} to{opacity:0} }
    @keyframes sheetUp  { from{transform:translateY(110%)} to{transform:translateY(0)} }
    @keyframes sheetDown{ from{transform:translateY(0)} to{transform:translateY(110%)} }

    .sheet-scrim {
      display: none;
      position: fixed; inset: 0; z-index: 450;
      background: rgba(0,0,0,.38);
    }
    .sheet-scrim.open    { display: block; animation: scrimIn  .3s var(--ease) both; }
    .sheet-scrim.closing { animation: scrimOut .32s var(--ease) both; }

    .m3-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 600;
      background: var(--md-surface-1);
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -2px 24px rgba(0,0,0,.18);
      display: flex; flex-direction: column;
      max-height: 92dvh;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      will-change: transform;
      transform: translateY(110%);
      transition: none;
    }
    .m3-sheet.open    { animation: sheetUp   .4s var(--ease) both; }
    .m3-sheet.closing { animation: sheetDown .32s var(--ease) both; }

    .sheet-handle {
      flex-shrink: 0;
      display: flex; justify-content: center;
      padding: 12px 0 6px; cursor: grab;
      touch-action: none;
    }
    .sheet-handle::after {
      content: ''; width: 36px; height: 4px;
      border-radius: 2px;
      background: var(--md-outline-var);
    }

    .sheet-preview-area {
      flex: 1 1 auto;
      overflow-y: auto; overflow-x: hidden;
      background: var(--md-surface-2);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 12px 12px 0;
      -webkit-overflow-scrolling: touch;
    }
    .sheet-preview-area::-webkit-scrollbar { width: 3px; }
    .sheet-preview-area::-webkit-scrollbar-thumb { background: var(--md-outline-var); border-radius: 3px; }

    #previewWrapperMobile {
      transform-origin: top center;
      width: 794px; height: 1123px;
      box-shadow: var(--md-shadow-3); flex-shrink: 0;
    }

    .sheet-actions {
      flex-shrink: 0;
      display: flex; gap: 10px;
      background: var(--md-surface-2);
      padding: 12px 16px calc(16px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--md-outline-var);
    }
    .btn-sheet-close {
      height: 50px; padding: 0 18px; flex-shrink: 0;
      border-radius: 14px;
      border: 1.5px solid var(--md-outline-var); background: var(--md-surface-1);
      color: var(--md-on-surface-var);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-sheet-close:hover { border-color: var(--md-outline); color: var(--md-on-surface); }
    .btn-sheet-close svg { width: 16px; height: 16px; }
    .btn-download {
      flex: 1; height: 50px;
      border-radius: 14px; border: none;
      background: var(--md-primary); color: var(--md-on-primary);
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all .2s; box-shadow: var(--md-shadow-2);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-download:hover { filter: brightness(1.08); }
    .btn-download svg { width: 16px; height: 16px; }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 860px) {
      .page { grid-template-columns:1fr; }
      .form-panel {
        height:auto; position:static;
        border-right:none; border-bottom:1px solid var(--md-outline-var);
        padding-bottom:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px) + 8px);
      }
      .preview-panel { display:none; }
      .hero-top-band { padding: 18px 18px 48px; }
      .hero-title { font-size: 28px; }
    }
    @media (min-width: 861px) { #bnav { display:none; } }
    @media (max-width: 480px) {
      .hero-top-band  { padding: 16px 16px 44px; }
      .hero-bottom    { padding: 12px 16px 14px; }
      .hero-title     { font-size: 26px; }
      .form-scroll    { padding: 12px 12px 20px; }
      .topbar-title   { font-size: 16px; }
    }
  </style>
</head>

  <div class="sheet-scrim" id="sheetScrim"></div>
  <div class="m3-sheet" id="previewSheet">
    <div class="sheet-handle" id="sheetHandle"></div>
    <div class="sheet-preview-area" id="previewScene">
      <div id="previewWrapperMobile" style="transform-origin:top center;width:794px;height:1123px;"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn-sheet-close" onclick="closePreview()" aria-label="Close preview">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>

        Download PDF
      </button>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/share.js"></script>

  <script>
    const htmlEl = document.documentElement;
    document.getElementById('themeBtn').addEventListener('click', () => {
      htmlEl.setAttribute('data-theme', htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    window.addEventListener('scroll', () => {
      document.getElementById('topbar').classList.toggle('scrolled', scrollY > 4);
    }, { passive: true });

    document.addEventListener('click', function(e) {
      const head = e.target.closest('.section-head');
      if (head) head.closest('.form-section').classList.toggle('collapsed');
    });

    const params   = new URLSearchParams(window.location.search);
    const designId = params.get('design') || 'nwu';

    const styleLink = document.createElement('link');
    styleLink.rel   = 'stylesheet';
    styleLink.href  = 'designs/' + designId + '/style.css';
    document.head.appendChild(styleLink);

    const configScript   = document.createElement('script');
    configScript.src     = 'designs/' + designId + '/config.js';
    configScript.onload  = buildPage;
    configScript.onerror = function () {
      document.getElementById('form-body').innerHTML =
        '<p style="color:var(--md-primary);padding:20px;font-size:14px;">Design <strong>' + designId + '</strong> not found.</p>';
    };
    document.head.appendChild(configScript);

    function buildPage() {
      const D = window.DESIGN;
      if (!D) return;
      document.title = D.formTitle + ' — M Rayhan';
      document.getElementById('nav-design-name').textContent = D.formTitle;
      const titleEl = document.getElementById('form-title');
      if (titleEl) titleEl.innerHTML = D.formTitle;
      const pillEl = document.getElementById('hero-style-name');
      if (pillEl) pillEl.textContent = D.formTitle || designId;
      document.getElementById('previewWrapper').innerHTML = D.renderCover();
      scaleA4();
      document.getElementById('previewWrapperMobile').innerHTML = D.renderCover();
      document.getElementById('form-body').innerHTML = renderFormSections(D.fields) + renderShareSection();
      D.fields.filter(f => f.type === 'custom-select').forEach(f => initCustomSelect(f.id));
      setupAutoSelect();
      updatePreview();
      loadFromShareLink();
    }

    function scaleA4() {
      const scaler  = document.getElementById('a4Scaler');
      const wrapper = document.getElementById('previewWrapper');
      if (!scaler || !wrapper) return;
      const scale = scaler.clientWidth / 794;
      wrapper.style.transform       = 'scale(' + scale + ')';
      wrapper.style.transformOrigin = 'top center';
    }
    window.addEventListener('resize', function() {
      scaleA4();
      if (previewSheet && previewSheet.classList.contains('open')) fitMobilePreview();
    });

    function updatePreview() {
      const D = window.DESIGN;
      if (!D) return;
      const keys = ['type', 'dept', 'title', 'code', 'sname', 'sid', 'term', 'tname', 'date'];
      ['previewWrapper', 'previewWrapperMobile'].forEach(function(wrId) {
        var wr = document.getElementById(wrId);
        if (!wr) return;
        keys.forEach(function(k) {
          var out = wr.querySelector('#out-' + k);
          var inp = document.getElementById('in-' + k);
          if (inp && out) out.innerText = inp.value;
        });
        var tdesigEl  = document.getElementById('in-tdesig');
        var tdesigOut = wr.querySelector('#out-tdesig');
        if (tdesigEl && tdesigOut) {
          tdesigOut.innerHTML = tdesigEl.value
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\n/g,'<br>');
        }
        if (typeof D.updateCoverExtras === 'function') D.updateCoverExtras(wr);
      });
    }

    const sheetScrim   = document.getElementById('sheetScrim');
    const previewSheet = document.getElementById('previewSheet');
    const pageEl       = document.querySelector('.page');

    function showPreview() {
      updatePreview();
      document.body.style.overflow = 'hidden';
      previewSheet.style.transform  = '';
      previewSheet.style.transition = '';
      sheetScrim.classList.remove('closing');
      previewSheet.classList.remove('closing');
      sheetScrim.classList.add('open');
      previewSheet.classList.add('open');
      if (pageEl) pageEl.classList.add('sheet-open');
      fitMobilePreview();
      initSheetDrag();
    }

    function closePreview() {
      sheetScrim.classList.add('closing');
      previewSheet.classList.add('closing');
      previewSheet.style.transform  = '';
      previewSheet.style.transition = '';
      if (pageEl) pageEl.classList.remove('sheet-open');
      const DURATION = 320;
      setTimeout(() => {
        sheetScrim.classList.remove('open', 'closing');
        previewSheet.classList.remove('open', 'closing');
        document.body.style.overflow = '';
      }, DURATION);
    }

    sheetScrim.addEventListener('click', closePreview);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePreview(); });

    function initSheetDrag() {
      const handle = document.getElementById('sheetHandle');
      let startY = 0, currentY = 0, dragging = false;

      function onTouchStart(e) {
        startY = e.touches[0].clientY; currentY = 0; dragging = true;
        previewSheet.style.transition = 'none';
      }
      function onTouchMove(e) {
        if (!dragging) return;
        const dy = e.touches[0].clientY - startY;
        currentY = Math.max(0, dy);
        previewSheet.style.transform = 'translateY(' + currentY + 'px)';
        const ratio = Math.min(currentY / (previewSheet.offsetHeight * 0.55), 1);
        sheetScrim.style.opacity = (1 - ratio * 0.9).toString();
        if (e.cancelable) e.preventDefault();
      }
      function onTouchEnd() {
        if (!dragging) return;
        dragging = false;
        previewSheet.style.transition = '';
        sheetScrim.style.opacity = '';
        const threshold = previewSheet.offsetHeight * 0.30;
        if (currentY > threshold) {
          previewSheet.style.transition = 'transform .28s var(--ease)';
          previewSheet.style.transform  = 'translateY(100%)';
          if (pageEl) pageEl.classList.remove('sheet-open');
          setTimeout(() => {
            previewSheet.style.transform  = '';
            previewSheet.style.transition = '';
            sheetScrim.classList.remove('open', 'closing');
            previewSheet.classList.remove('open', 'closing');
            document.body.style.overflow = '';
          }, 290);
        } else {
          previewSheet.style.transition = 'transform .32s var(--spring)';
          previewSheet.style.transform  = 'translateY(0)';
          setTimeout(() => { previewSheet.style.transform = ''; previewSheet.style.transition = ''; }, 340);
        }
        currentY = 0;
      }

      [handle, previewSheet].forEach(el => {
        el.removeEventListener('touchstart', el._tsHandler);
        el.removeEventListener('touchmove',  el._tmHandler);
        el.removeEventListener('touchend',   el._teHandler);
        el._tsHandler = onTouchStart;
        el._tmHandler = onTouchMove;
        el._teHandler = onTouchEnd;
        el.addEventListener('touchstart', onTouchStart, { passive: true });
        el.addEventListener('touchmove',  onTouchMove,  { passive: false });
        el.addEventListener('touchend',   onTouchEnd);
      });
    }

    function fitMobilePreview() {
      var area    = document.getElementById('previewScene');
      var wrapper = document.getElementById('previewWrapperMobile');
      if (!area || !wrapper) return;
      setTimeout(function() {
        var availW  = area.clientWidth - 24;
        var scale   = Math.min(availW / 794, 1);
        var scaledH = Math.round(1123 * scale);
        wrapper.style.transform       = 'scale(' + scale + ')';
        wrapper.style.transformOrigin = 'top center';
        area.style.height = Math.min(scaledH + 24, window.innerHeight * 0.68) + 'px';
      }, 60);
    }

    function downloadPDF() {
      var D    = window.DESIGN;
      var btns = document.querySelectorAll('.btn-download-top, .btn-download, .btn-form-filled');
      var el   = document.getElementById('previewWrapper').firstElementChild
              || document.getElementById('cover-page')
              || document.getElementById('previewWrapper');
      var fn   = (D && D.pdfFilename) ? D.pdfFilename : 'Cover-Page.pdf';
      btns.forEach(function(b){ b.textContent = 'Generating…'; b.disabled = true; });
      html2pdf().set({
        margin: 0, filename: fn,
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2, useCORS: true, scrollX: 0, scrollY: 0 },
        jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' },
        onclone: function(doc) {
          var e = doc.getElementById('cover-page');
          if (e) { e.style.transform='none'; e.style.width='794px'; e.style.height='1123px'; e.style.margin='0'; }
        }
      }).from(el).save().then(function() {
        var dlIcon = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>';
        btns.forEach(function(b){ b.innerHTML = dlIcon + ' Download PDF'; b.disabled = false; });
      });
    }

    var FIELD_SECTION = {
      'in-type':'assignment','in-dept':'assignment','in-title':'assignment',
      'in-code':'assignment','in-term':'assignment',
      'in-sname':'student','in-sid':'student',
      'in-tname':'teacher','in-tdesig':'teacher','in-date':'teacher',
    };

    var SECTION_DEF = {
      assignment: {
        label: 'Assignment Details',
        icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 6.414V19a2 2 0 01-2 2z"/></svg>',
      },
      student: {
        label: 'Student Details',
        icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>',
      },
      teacher: {
        label: 'Teacher Details',
        icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>',
      },
      other: {
        label: 'Design Option',
        icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>',
      },
    };

    function renderFormSections(fields) {
      var groups  = {};
      var SEC_ORD = ['other', 'assignment', 'student', 'teacher'];
      fields.forEach(function(f) {
        var sec = FIELD_SECTION[f.id] || 'other';
        if (!groups[sec]) groups[sec] = [];
        groups[sec].push(f);
      });
      var html = '';
      SEC_ORD.forEach(function(secKey) {
        var sFields = groups[secKey];
        if (!sFields || sFields.length === 0) return;
        var def = SECTION_DEF[secKey];
        html += '<div class="form-section">';
        html += '<button class="section-head" type="button">';
        html += '<div class="section-icon">' + def.icon + '</div>';
        html += '<span class="section-title">' + def.label + '</span>';
        html += '<span class="section-badge">' + sFields.length + (sFields.length===1?' field':' fields') + '</span>';
        html += '<svg class="section-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>';
        html += '</button>';
        html += '<div class="section-body">';
        sFields.forEach(function(f) { html += renderOneField(f); });
        html += '</div></div>';
      });
      return html;
    }

    function renderOneField(f) {
      if (f.type === 'custom-select') {
        var opts = f.options.map(function(o, i) {
          return '<div class="option'+(i===0?' active':'')+'" data-value="'+o.value+'">'+o.label+'</div>';
        }).join('');
        return '<div class="input-group"><label>'+f.label+'</label>'
          + '<div class="custom-select" id="'+f.id+'">'
          + '<div class="select-trigger" role="button" tabindex="0"><span class="selected">'+f.defaultLabel+'</span><span class="arrow">▾</span></div>'
          + '<div class="options" role="listbox">'+opts+'</div>'
          + '<input type="hidden" id="'+f.hiddenId+'" value="'+f.defaultValue+'"></div></div>';
      }
      if (f.type === 'text-with-align') {
        return '<div class="input-group"><label>'+f.label+'</label><div class="dept-row">'
          + '<input type="text" id="'+f.id+'" value="'+f.defaultValue+'" oninput="updatePreview()">'
          + '<select id="'+(f.alignId||'in-dept-align')+'" onchange="updatePreview()"><option value="center">⠿ Center</option><option value="left">≡ Left</option></select>'
          + '</div></div>';
      }
      if (f.type === 'textarea') {
        var hint = f.hint ? ' <span style="font-size:10px;font-weight:400;color:var(--md-on-surface-var);text-transform:none;letter-spacing:0;">'+f.hint+'</span>' : '';
        return '<div class="input-group"><label>'+f.label+hint+'</label>'
          + '<textarea id="'+f.id+'" rows="'+(f.rows||3)+'" oninput="updatePreview()">'+(f.defaultValue||'')+'</textarea></div>';
      }
      return '<div class="input-group"><label>'+f.label+'</label>'
        + '<input type="text" id="'+f.id+'" value="'+(f.defaultValue||'')+'" oninput="updatePreview()"></div>';
    }

    function renderShareSection() {
      var actions = '<div class="form-actions">'
        + '<button class="btn-form-filled" id="btnPreviewDownload" onclick="showPreview()">'
        + '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>'
        + 'Preview &amp; Download</button></div>';

      var share = '<div class="share-section"><div class="share-label">Share Link</div>'
        + '<button class="btn-share" onclick="generateShareLink()">'
        + '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>'
        + 'Generate Shareable Link</button>'
        + '<div class="share-link-row" id="shareLinkRow">'
        + '<input type="text" class="share-link-input" id="shareLinkOutput" readonly>'
        + '<button class="btn-copy" id="btnCopy" onclick="copyShareLink()">Copy</button>'
        + '</div></div>';

      return actions + share;
    }
  </script>
</body>
</html>
