<!-- ===== GLOBAL BOTTOM SHEETS ===== -->
<!-- Blog editor sheet -->
<div class="sheet-scrim" id="blog-sheet-scrim">
  <div class="m3-sheet">
    <div class="sheet-handle"></div>
    <div style="padding: 0 20px 20px;">
      <div class="sheet-headline" id="blog-sheet-title">New Post</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px;max-height:70vh;overflow-y:auto;">
        <input type="hidden" id="blog-edit-id" />
        <div class="form-group"><label class="form-label">Title *</label><input id="blog-title" type="text" class="field" placeholder="Post title..." /></div>
        <div class="form-group"><label class="form-label">Tags (comma-separated)</label><input id="blog-tags" type="text" class="field" placeholder="AI, career, webdev" /></div>
        <div class="form-group"><label class="form-label">Reading Time</label><input id="blog-reading-time" type="text" class="field" placeholder="5 min" /></div>
        <div class="form-group"><label class="form-label">Excerpt</label><textarea id="blog-excerpt" class="field" rows="2" placeholder="Short description..."></textarea></div>
        <div class="form-group"><label class="form-label">Content (Markdown) *</label><textarea id="blog-content" class="field" rows="10" style="font-family:var(--font-code);font-size:13px;" placeholder="# Title&#10;&#10;Write in **Markdown**..."></textarea></div>
        <button id="blog-publish-btn" class="btn-filled" style="width:100%;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          Publish Post
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Cert editor sheet -->
<div class="sheet-scrim" id="cert-sheet-scrim">
  <div class="m3-sheet">
    <div class="sheet-handle"></div>
    <div style="padding: 0 20px 20px;">
      <div class="sheet-headline" id="cert-sheet-title">Add Certification</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px;">
        <input type="hidden" id="cert-edit-id" />
        <div class="form-group"><label class="form-label">Certificate Name *</label><input id="cert-name" type="text" class="field" placeholder="Python for Everybody" /></div>
        <div class="form-group"><label class="form-label">Issuer *</label><input id="cert-issuer" type="text" class="field" placeholder="Coursera / University of Michigan" /></div>
        <div class="form-group"><label class="form-label">Date</label><input id="cert-date" type="date" class="field" /></div>
        <div class="form-group"><label class="form-label">Accent Color</label><div class="color-input-wrap"><input id="cert-color" type="color" value="#1A6B3F" /><span style="font-size:13px;color:var(--on-sv);">Card border color</span></div></div>
        <div class="form-group"><label class="form-label">Verify URL</label><input id="cert-verify-url" type="url" class="field" placeholder="https://coursera.org/verify/..." /></div>
        <button id="cert-save-btn" class="btn-filled" style="width:100%;">Save Certificate</button>
      </div>
    </div>
  </div>
</div>

<!-- New repo sheet -->
<div class="sheet-scrim" id="new-repo-sheet-scrim">
  <div class="m3-sheet">
    <div class="sheet-handle"></div>
    <div style="padding: 0 20px 20px;">
      <div class="sheet-headline">New Repository</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px;">
        <div class="form-group"><label class="form-label">Repo Name *</label><input id="new-repo-name" type="text" class="field" placeholder="my-project" /></div>
        <div class="form-group"><label class="form-label">Description</label><input id="new-repo-desc" type="text" class="field" placeholder="What this does..." /></div>
        <div class="form-group" style="flex-direction:row;align-items:center;justify-content:space-between;">
          <label class="form-label" style="text-transform:none;font-size:14px;">Make Private</label>
          <label style="position:relative;display:inline-block;width:48px;height:26px;cursor:pointer;">
            <input type="checkbox" id="new-repo-private" style="opacity:0;width:0;height:0;position:absolute;" />
            <span id="new-repo-track" style="position:absolute;inset:0;border-radius:13px;background:var(--out-v);transition:background .3s;"></span>
            <span id="new-repo-thumb" style="position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:white;box-shadow:0 2px 4px rgba(0,0,0,.3);transition:transform .3s;"></span>
          </label>
        </div>
        <button id="create-repo-btn" class="btn-filled" style="width:100%;">Create Repository</button>
      </div>
    </div>
  </div>
</div>

<!-- New file sheet -->
<div class="sheet-scrim" id="new-file-sheet-scrim">
  <div class="m3-sheet">
    <div class="sheet-handle"></div>
    <div style="padding: 0 20px 20px;">
      <div class="sheet-headline">Push File to GitHub</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px;">
        <div class="form-group"><label class="form-label">File Path *</label><input id="new-file-path" type="text" class="field" placeholder="src/index.js" /></div>
        <div class="form-group"><label class="form-label">Commit Message</label><input id="new-file-commit" type="text" class="field" placeholder="Add file" value="Add file via Admin" /></div>
        <div class="form-group"><label class="form-label">Content *</label><textarea id="new-file-content" class="field" rows="8" style="font-family:var(--font-code);font-size:13px;" placeholder="// code here..."></textarea></div>
        <button id="push-file-btn" class="btn-filled" style="width:100%;">Push to GitHub</button>
      </div>
    </div>
  </div>
</div>
