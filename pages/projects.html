<div class="inner-page root-content">
  <div class="page-hdr reveal">
    <p class="section-label">// My Projects</p>
    <h2 class="section-h2">What I've <em>Built...</em></h2>
  </div>
  <div class="projects-topbar">
    <span style="font-size:13px;color:var(--on-sv);" id="repos-count"></span>
    <button class="filter-btn" id="filter-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/></svg>
      Filter
    </button>
  </div>
  <div id="repos-grid" class="repos-grid"></div>
  <div id="load-more-wrap" class="load-more-wrap" style="display:none;">
    <button id="load-more-btn" class="btn-ghost">Load More</button>
  </div>
</div>

<div class="sheet-scrim" id="filter-scrim">
  <div class="m3-sheet">
    <div class="sheet-handle"></div>
    <div style="padding:0 20px 20px;">
      <div class="sheet-headline">Filter &amp; Sort</div>
      <div style="margin-top:16px;">
        <div class="filter-group-label">Language</div>
        <div id="lang-chips" class="filter-chips"></div>
      </div>
      <div style="margin-top:16px;">
        <div class="filter-group-label">Sort By</div>
        <div class="filter-chips" id="sort-chips">
          <button class="chip active" data-sort="updated">Recent</button>
          <button class="chip" data-sort="stars">Stars</button>
          <button class="chip" data-sort="forks">Forks</button>
          <button class="chip" data-sort="name">Name A-Z</button>
        </div>
      </div>
      <div class="filter-apply-row">
        <button id="filter-reset-btn" class="btn-ghost">Reset</button>
        <button id="filter-apply-btn" class="btn-filled">Apply</button>
      </div>
    </div>
  </div>
</div>
