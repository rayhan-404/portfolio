<div class="projects-page page-wrapper">

  <!-- Top bar -->
  <div class="projects-topbar">
    <h1 class="page-title">Projects</h1>
    <button class="icon-btn" id="filter-btn" aria-label="Filter projects" title="Filter &amp; Sort">
      <span class="material-symbols-rounded">tune</span>
    </button>
  </div>

  <!-- Active filters display -->
  <div id="filter-indicator" class="filter-indicator" style="display:none;">
    <span id="active-lang-chip" class="active-filter-chip" style="display:none;">
      <span class="lang-dot" id="active-lang-dot"></span>
      <span id="active-lang-text"></span>
      <span class="material-symbols-rounded">close</span>
    </span>
    <span id="active-sort-chip" class="active-filter-chip" style="display:none;">
      <span class="material-symbols-rounded">sort</span>
      <span id="active-sort-text"></span>
    </span>
  </div>

  <!-- Repos Grid -->
  <div id="repos-grid" class="repos-grid">
    <!-- Skeleton -->
    <div class="project-card-skeleton nm-card section-hidden stagger-1">
      <div class="skeleton skeleton-text w-60" style="height:16px;"></div>
      <div class="skeleton skeleton-text w-100" style="height:12px; margin-top:4px;"></div>
      <div class="skeleton skeleton-text w-80" style="height:12px;"></div>
      <div class="skeleton skeleton-text w-40" style="height:12px; margin-top:8px;"></div>
    </div>
    <div class="project-card-skeleton nm-card section-hidden stagger-2">
      <div class="skeleton skeleton-text w-80" style="height:16px;"></div>
      <div class="skeleton skeleton-text w-100" style="height:12px; margin-top:4px;"></div>
      <div class="skeleton skeleton-text w-60" style="height:12px;"></div>
      <div class="skeleton skeleton-text w-40" style="height:12px; margin-top:8px;"></div>
    </div>
    <div class="project-card-skeleton nm-card section-hidden stagger-3">
      <div class="skeleton skeleton-text w-70" style="height:16px;"></div>
      <div class="skeleton skeleton-text w-100" style="height:12px; margin-top:4px;"></div>
      <div class="skeleton skeleton-text w-80" style="height:12px;"></div>
      <div class="skeleton skeleton-text w-40" style="height:12px; margin-top:8px;"></div>
    </div>
    <div class="project-card-skeleton nm-card section-hidden stagger-4" style="display:none;">
      <div class="skeleton skeleton-text w-50" style="height:16px;"></div>
      <div class="skeleton skeleton-text w-100" style="height:12px; margin-top:4px;"></div>
      <div class="skeleton skeleton-text w-70" style="height:12px;"></div>
      <div class="skeleton skeleton-text w-40" style="height:12px; margin-top:8px;"></div>
    </div>
    <div class="project-card-skeleton nm-card section-hidden stagger-5" style="display:none;">
      <div class="skeleton skeleton-text w-90" style="height:16px;"></div>
      <div class="skeleton skeleton-text w-100" style="height:12px; margin-top:4px;"></div>
      <div class="skeleton skeleton-text w-50" style="height:12px;"></div>
      <div class="skeleton skeleton-text w-40" style="height:12px; margin-top:8px;"></div>
    </div>
  </div>

  <!-- Load More -->
  <div id="load-more-wrap" class="load-more-wrap" style="display:none;">
    <button id="load-more-btn" class="md-btn-text">
      <span class="material-symbols-rounded">expand_more</span>
      Load More
    </button>
  </div>

</div>

<!-- ===== FILTER BOTTOM SHEET ===== -->
<div id="filter-sheet" class="bottom-sheet" role="dialog" aria-label="Filter projects">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Filter &amp; Sort</div>

  <div class="sheet-content">
    <!-- Language filter -->
    <div>
      <div class="filter-group-label">Language</div>
      <div id="lang-filter-chips" class="filter-chips">
        <button class="md-chip active" data-lang="">All</button>
      </div>
    </div>

    <!-- Sort -->
    <div>
      <div class="filter-group-label">Sort By</div>
      <div id="sort-chips" class="filter-chips">
        <button class="md-chip active" data-sort="updated">Recent</button>
        <button class="md-chip" data-sort="stars">Stars</button>
        <button class="md-chip" data-sort="forks">Forks</button>
        <button class="md-chip" data-sort="name">Name</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="filter-sheet-actions">
      <button id="filter-reset-btn" class="md-btn-outlined">Reset</button>
      <button id="filter-apply-btn" class="md-btn-filled">Apply</button>
    </div>
  </div>
</div>
