<!-- HOME PAGE — Full Screen Hero + Sections -->
<div class="root-content">

  <!-- ══ HERO ══ -->
  <section class="hero" id="home-hero">

    <!-- Text side (left desktop / bottom mobile) -->
    <div class="hero-text">
      <p class="hero-greeting">Hello, I'm</p>
      <h1 class="hero-name" id="hero-typed">Rayhan<em>.</em></h1>
      <div class="hero-role-chip" id="hero-chip">🎓 B.Sc. CSE — NWU Khulna</div>
      <p class="hero-sub">
        Computer Science &amp; Engineering student, passionate about
        <strong style="color:var(--on-s);">AI &amp; Machine Learning</strong> and building things from scratch.
      </p>
      <div class="hero-cta">
        <a href="#projects" class="btn-filled">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
          </svg>
          View Projects
        </a>
        <a href="#contact" class="btn-ghost">Contact Me</a>
      </div>
    </div>

    <!-- Photo (right desktop / top mobile) -->
    <div class="hero-photo-glow"></div>
    <div class="photo-frame" id="photo-frame">
      <div class="mob-orb mob-orb1"></div>
      <div class="mob-orb mob-orb2"></div>
      <div class="mob-orb mob-orb3"></div>
      <div class="mob-scanline"></div>
      <div class="hero-photo-wrap">
        <img id="hero-photo" src="https://rayhan.iam.bd/image/1772015520268_image.png" alt="M Rayhan" />
      </div>
    </div>

    <div class="scroll-indicator">
      <span class="si-line"></span>Scroll down
    </div>
  </section>

  <!-- ══ CURRENTLY LEARNING ══ -->
  <div class="learning-card reveal" id="learning-section">
    <div class="lc-inner">
      <div class="lc-label">🧠 Currently Learning</div>
      <div class="lc-topic" id="lc-topic">Loading...</div>
      <div class="lc-progress-track">
        <div class="lc-progress-fill" id="lc-bar" style="width:0%"></div>
      </div>
      <div class="lc-meta">
        <span class="lc-date" id="lc-date"></span>
        <span class="lc-pct" id="lc-pct">0%</span>
        <a id="lc-resource" href="#" target="_blank" rel="noopener"
           style="display:none;font-size:13px;font-weight:700;color:var(--pri);text-decoration:none;">
          Resource →
        </a>
      </div>
    </div>
  </div>

  <!-- ══ GITHUB STATS ══ -->
  <section class="section-wrap" id="stats-section" style="padding-top:0;padding-bottom:0;">
    <div id="stats-row" class="stats-row" style="flex-wrap:wrap;gap:10px;">
      <!-- Injected by JS -->
    </div>
  </section>

  <!-- ══ FEATURED PROJECTS ══ -->
  <section class="section-wrap" id="featured-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <p class="section-label" style="margin:0;">// Featured Projects</p>
      <a href="#projects" style="font-size:13px;font-weight:700;color:var(--pri);">See All →</a>
    </div>
    <div id="featured-repos" class="repo-scroll">
      <!-- Skeleton -->
      <div class="repo-card-h" style="min-width:240px;"><div class="sk sk-line w-60" style="height:14px;margin-bottom:8px;"></div><div class="sk sk-line w-100" style="height:12px;margin-bottom:4px;"></div><div class="sk sk-line w-80" style="height:12px;"></div></div>
      <div class="repo-card-h" style="min-width:240px;"><div class="sk sk-line w-80" style="height:14px;margin-bottom:8px;"></div><div class="sk sk-line w-100" style="height:12px;margin-bottom:4px;"></div><div class="sk sk-line w-60" style="height:12px;"></div></div>
    </div>
  </section>

  <!-- ══ SKILLS PREVIEW ══ -->
  <section class="section-wrap" id="skills-preview-section" style="padding-top:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <p class="section-label" style="margin:0;">// Skills</p>
      <a href="#skills" style="font-size:13px;font-weight:700;color:var(--pri);">See All →</a>
    </div>
    <div id="skills-preview-chips" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
  </section>

</div>
