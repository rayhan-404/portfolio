<div class="inner-page root-content">
  <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;padding-bottom:24px;" class="reveal">
    <div id="prof-avatar-wrap">
      <div id="prof-avatar-ph" style="width:96px;height:96px;border-radius:50%;background:var(--pri-c);color:var(--on-pri-c);display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-size:36px;font-weight:800;box-shadow:0 0 0 4px var(--pri),0 0 0 8px var(--bg),var(--neu-out);">R</div>
      <img id="prof-avatar" src="" alt="" style="display:none;width:96px;height:96px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 4px var(--pri),0 0 0 8px var(--bg),var(--neu-out);" />
    </div>
    <div>
      <h1 id="prof-name" style="font-family:var(--font-heading);font-size:26px;font-weight:800;color:var(--on-s);margin-bottom:4px;">M Rayhan</h1>
      <p id="prof-bio" style="font-size:14px;color:var(--on-sv);max-width:340px;margin:0 auto;line-height:1.6;"></p>
    </div>
    <div id="prof-chips" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;"></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;" class="reveal d2">
    <button onclick="window.location.hash='projects'" class="neu-card" style="border:none;cursor:pointer;padding:20px;text-align:center;background:var(--s1);">
      <div style="font-size:28px;margin-bottom:8px;">💻</div>
      <div style="font-family:var(--font-heading);font-size:14px;font-weight:700;color:var(--on-s);">Projects</div>
      <div style="font-size:12px;color:var(--on-sv);margin-top:3px;">Browse repos</div>
    </button>
    <button onclick="window.location.hash='blog'" class="neu-card" style="border:none;cursor:pointer;padding:20px;text-align:center;background:var(--s1);">
      <div style="font-size:28px;margin-bottom:8px;">📝</div>
      <div style="font-family:var(--font-heading);font-size:14px;font-weight:700;color:var(--on-s);">Blog</div>
      <div style="font-size:12px;color:var(--on-sv);margin-top:3px;">Read posts</div>
    </button>
    <button onclick="window.location.hash='certifications'" class="neu-card" style="border:none;cursor:pointer;padding:20px;text-align:center;background:var(--s1);">
      <div style="font-size:28px;margin-bottom:8px;">🏆</div>
      <div style="font-family:var(--font-heading);font-size:14px;font-weight:700;color:var(--on-s);">Certs</div>
      <div style="font-size:12px;color:var(--on-sv);margin-top:3px;">View credentials</div>
    </button>
    <button onclick="window.location.hash='contact'" class="neu-card" style="border:none;cursor:pointer;padding:20px;text-align:center;background:var(--s1);">
      <div style="font-size:28px;margin-bottom:8px;">📬</div>
      <div style="font-family:var(--font-heading);font-size:14px;font-weight:700;color:var(--on-s);">Contact</div>
      <div style="font-size:12px;color:var(--on-sv);margin-top:3px;">Get in touch</div>
    </button>
  </div>
</div>
