<div id="admin-root" class="page-wrapper">
  <!-- Auth screens and panel are injected here by admin.js -->
  <div class="page-loading"><div class="spinner"></div></div>
</div>

<!-- ===== BLOG EDITOR BOTTOM SHEET ===== -->
<div id="blog-sheet" class="bottom-sheet" role="dialog" aria-label="Blog post editor">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="blog-sheet-title">New Post</div>
  <div class="sheet-form">
    <input type="hidden" id="blog-edit-id" value="" />
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input id="blog-title" type="text" class="nm-input" placeholder="Post title..." />
    </div>
    <div class="form-group">
      <label class="form-label">Tags (comma-separated)</label>
      <input id="blog-tags" type="text" class="nm-input" placeholder="AI, career, webdev" />
    </div>
    <div class="form-group">
      <label class="form-label">Reading Time</label>
      <input id="blog-reading-time" type="text" class="nm-input" placeholder="5 min" />
    </div>
    <div class="form-group">
      <label class="form-label">Excerpt (2-3 sentences)</label>
      <textarea id="blog-excerpt" class="nm-input" rows="2" placeholder="Short description shown on card..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Content (Markdown) *</label>
      <textarea id="blog-content" class="nm-input" rows="12" placeholder="# Post Title&#10;&#10;Write your post in **Markdown**..."></textarea>
    </div>
    <button id="blog-publish-btn" class="md-btn-filled" style="width:100%;">
      <span class="material-symbols-rounded">publish</span>
      Publish Post
    </button>
  </div>
</div>

<!-- ===== CERT EDITOR BOTTOM SHEET ===== -->
<div id="cert-sheet" class="bottom-sheet" role="dialog" aria-label="Certification editor">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="cert-sheet-title">Add Certification</div>
  <div class="sheet-form">
    <input type="hidden" id="cert-edit-id" value="" />
    <div class="form-group">
      <label class="form-label">Certificate Name *</label>
      <input id="cert-name" type="text" class="nm-input" placeholder="Python for Everybody" />
    </div>
    <div class="form-group">
      <label class="form-label">Issuer *</label>
      <input id="cert-issuer" type="text" class="nm-input" placeholder="Coursera / University of Michigan" />
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input id="cert-date" type="date" class="nm-input" />
    </div>
    <div class="form-group">
      <label class="form-label">Accent Color</label>
      <div class="color-input-wrap">
        <input id="cert-color" type="color" value="#6750A4" />
        <span style="font-size:13px;color:var(--md-on-surface-variant);">Card border color</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Verify URL</label>
      <input id="cert-verify-url" type="url" class="nm-input" placeholder="https://coursera.org/verify/..." />
    </div>
    <button id="cert-save-btn" class="md-btn-filled" style="width:100%;">
      <span class="material-symbols-rounded">save</span>
      Save Certificate
    </button>
  </div>
</div>

<!-- ===== NEW REPO BOTTOM SHEET ===== -->
<div id="new-repo-sheet" class="bottom-sheet" role="dialog" aria-label="Create repository">
  <div class="sheet-handle"></div>
  <div class="sheet-title">New Repository</div>
  <div class="sheet-form">
    <div class="form-group">
      <label class="form-label">Repository Name *</label>
      <input id="new-repo-name" type="text" class="nm-input" placeholder="my-awesome-project" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input id="new-repo-desc" type="text" class="nm-input" placeholder="What this project does..." />
    </div>
    <div class="form-group" style="flex-direction:row;align-items:center;justify-content:space-between;">
      <label class="form-label" style="text-transform:none;font-size:14px;font-weight:500;">Make Private</label>
      <label class="md-switch">
        <input type="checkbox" id="new-repo-private" />
        <span class="md-switch-track"></span>
        <span class="md-switch-thumb"></span>
      </label>
    </div>
    <button id="create-repo-btn" class="md-btn-filled" style="width:100%;">
      <span class="material-symbols-rounded">add</span>
      Create Repository
    </button>
  </div>
</div>

<!-- ===== NEW FILE BOTTOM SHEET ===== -->
<div id="new-file-sheet" class="bottom-sheet" role="dialog" aria-label="Push new file">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Push File to GitHub</div>
  <div class="sheet-form">
    <div class="form-group">
      <label class="form-label">File Path *</label>
      <input id="new-file-path" type="text" class="nm-input" placeholder="src/index.js" />
    </div>
    <div class="form-group">
      <label class="form-label">Commit Message</label>
      <input id="new-file-commit" type="text" class="nm-input" placeholder="Add index.js" value="Add file via Admin" />
    </div>
    <div class="form-group">
      <label class="form-label">Content *</label>
      <textarea id="new-file-content" class="nm-input" rows="10" placeholder="// Your code here..."></textarea>
    </div>
    <button id="push-file-btn" class="md-btn-filled" style="width:100%;">
      <span class="material-symbols-rounded">upload</span>
      Push to GitHub
    </button>
  </div>
</div>
